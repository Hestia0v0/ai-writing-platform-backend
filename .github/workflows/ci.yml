name: CI

# ── 触发说明（临时关闭自动运行）────────────────────────────────────────────
# 当前仓库中 backend-ci.yml 承担「最小纯单元测试」自动门禁；本 workflow 含
# frontend / docker / integration 等尚不稳定或依赖缺失路径的任务，故暂不绑定
# push / pull_request，避免每次推送都产生失败或无效运行。
#
# 恢复自动触发：取消下面注释，并视情况删除或保留 workflow_dispatch。
# on:
#   push:
#     branches: [main, develop]
#   pull_request:
#     branches: [main, develop]
on:
  workflow_dispatch:

jobs:
  # ─── Backend Unit Tests ──────────────────────────────────────
  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api_gateway, ai_inference, knowledge_retrieval, pipelines]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/${{ matrix.service }}/requirements.txt pytest httpx pytest-asyncio

      - name: Run unit tests for ${{ matrix.service }}
        run: |
          pytest tests/unit/test_${{ matrix.service }}.py -v

  # ─── Frontend Lint & Build ──────────────────────────────────
  build-frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:8000

  # ─── Docker Build Smoke Test ────────────────────────────────
  build-docker:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [test-backend]
    strategy:
      matrix:
        service: [api_gateway, ai_inference, knowledge_retrieval, pipelines]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for ${{ matrix.service }}
        run: |
          docker build -t platform/${{ matrix.service }}:ci backend/${{ matrix.service }}

  build-docker-frontend:
    name: Docker Build (frontend)
    runs-on: ubuntu-latest
    needs: [build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image for frontend
        run: docker build -t platform/frontend:ci frontend

  # ─── Integration Gate (manual / scheduled) ──────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-docker, build-docker-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        working-directory: infrastructure
        run: |
          cp .env.example .env
          docker compose up -d --wait
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install pytest httpx

      - name: Run integration tests
        run: pytest tests/integration/ -v -m integration

      - name: Tear down services
        if: always()
        working-directory: infrastructure
        run: docker compose down -v
